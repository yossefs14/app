trigger: none 

variables:
  - name: imagetag
    value: $(Build.BuildId)
  - name: ACR_NAME
    value: myjenkinsacr

pool:
  name: Default

stages:
  - stage: CI
    displayName: Build and Push to ACR
    jobs:
      - job: BuildAndPush
        steps:

          - script: |
              ls -la helm
  - stage: CD
    displayName: Deploy to AKS
    dependsOn: CI
    jobs:
      - deployment: HelmDeploy
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: ls -la helm
                - task: HelmDeploy@0
                  displayName: HelmUpgrade
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    kubernetesServiceConnection: 'aks-connection'
                    namespace: 'prod'
                    command: 'upgrade'
                    chartType: 'FilePath'
                    chartPath: '$(Build.SourcesDirectory)/helm'
                    releaseName: 'demo'
                    overrideValues: 'image.tag=$(imagetag), secret.postgresUser=$(POSTGRES_USER), secret.postgresPassword=$(POSTGRES_PASSWORD), secret.redisPassword=$(REDIS_PASSWORD), config.postgresHost=myapp-postgres, config.redisHost=myapp-redis'
                    valueFile: '$(Build.SourcesDirectory)/helm/values.yaml'